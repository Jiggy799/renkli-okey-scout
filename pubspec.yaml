name: renkli_okey_scout
description: "RenkliOkeyScout — Cross-platform Okey scoring app with AI tile detection."
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0
  realtime_client: ^2.9.0

  # QR Code generation & scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # State management
  provider: ^6.1.2

  # Local storage for settings
  path_provider: ^2.1.5

  # HTTP for Vision AI
  http: ^1.3.0

  # Image picker for rack photos
  image_picker: ^1.1.2

  # ONNX Runtime for on-device tile detection
  # NOTE: onnxruntime ^1.4.1 requires android-33, conflicts with our compileSdk=36.
  # Re-enable once onnxruntime supports android-36:
  # onnxruntime: ^1.4.1

  # Navigation
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
